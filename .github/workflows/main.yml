name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev xclip libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
        sudo apt-get install -y autoconf automake libtool pkg-config cmake libasound2-dev libjack-dev
        pip install --upgrade pip
        pip install "cython==0.29.36" virtualenv "buildozer==1.5.0" setuptools sh

    - name: Build apk with buildozer
      run: |
        yes | buildozer android debug

    - name: Upload apk artifact
      uses: actions/upload-artifact@v4
      with:
        name: Shivam-Game-APK
        path: bin/*.apk
